<!DOCTYPE html>
<html lang="ru">

 * {

.chat-container {

.chat-header {

 }

.chat-window {

 }

.message {
 margin: 10px;
 padding: 12px;
 border-radius: 8px;
 max-width: 70%;

 }

.message--user {

 }

.message--other {

 }

.message-sender {
 font-weight: bold;
 }

.message-form {
 padding: 15px;
 border-top: 1px solid #ddd;
 display: flex;
 flex-direction: column;
 }

.message-form input {
 width: 100%;
 padding: 10px;
 margin-bottom: 10px;
 border: 1px solid #ddd;
 border-radius: 4px;
 }

.message-form button {
 padding: 10px 15px;
 background: #007bff;
 color: white;
 border: none;
 border-radius: 4px;
 cursor: pointer;
 margin-top: 10px;
 }

.file-preview {
 margin-top: 10px;
 cursor: pointer;
 }

.file-preview img {
 max-width: 100%;
 height: auto;
 }
 </style>
</head>
